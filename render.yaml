# Render configuration for D&G Constructora Backend
# To deploy: Create account at render.com → "New Web Service" → Connect your GitHub repo
# Or use "Deploy from CLI" with: render blueprint launch render.yaml

services:
  - type: web
    name: dyg-constructora-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard manually
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: KIMI_AUTH_URL
        value: https://auth.kimi.com
      - key: KIMI_OPEN_URL
        value: https://open.kimi.com
      - key: OWNER_UNION_ID
        sync: false
      - key: MP_TICKET
        sync: false
    healthCheckPath: /api/trpc/ping
    autoDeploy: true
