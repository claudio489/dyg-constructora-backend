# Netlify configuration for D&G Constructora Frontend
[build]
  publish = "dist/public"
  command = "npm run build"

# SPA redirect - all routes go to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for caching static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CORS headers for API calls to Render backend
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
